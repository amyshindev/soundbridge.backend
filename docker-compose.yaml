services:
  backend:
    build: ./backend
    container_name: soundbridge_backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    container_name: soundbridge_redis
    ports:
      - "6379:6379"